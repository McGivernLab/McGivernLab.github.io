<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}

  <style>
    .site-header {
      background-color: #4f6f8f !important;
      border-bottom: none !important;
    }

    .site-title {
      color: white !important;
      font-weight: 600;
      font-size: 1.35rem;
    }

    .site-nav a {
      color: white !important;
    }
  </style>
</head>

<body>

  <header class="site-header">
    <div class="wrapper">
      <a class="site-title" href="/">{{ site.title }}</a>

      <nav class="site-nav">
        {% for page in site.pages %}
          {% if page.title %}
            <a href="{{ page.url }}">{{ page.title }}</a>
          {% endif %}
        {% endfor %}
      </nav>
    </div>
  </header>

  <main class="page-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

</body>
</html>
